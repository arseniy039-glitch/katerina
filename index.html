<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Екатерина</title>
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.js"></script>
<script>window.livekitClient = window.LivekitClient;</script>
<script src="https://cdn.jsdelivr.net/npm/@11labs/client@latest/dist/lib.umd.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 2px solid #2a2a4a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -1px;
    color: #8080c0;
    margin-bottom: 1.5rem;
    position: relative;
    transition: border-color 0.3s;
  }

  .avatar.speaking {
    border-color: #4a4aaa;
    box-shadow: 0 0 0 8px rgba(74, 74, 170, 0.1), 0 0 0 16px rgba(74, 74, 170, 0.05);
  }

  .avatar.listening {
    border-color: #4a9a6a;
    box-shadow: 0 0 0 8px rgba(74, 154, 106, 0.1), 0 0 0 16px rgba(74, 154, 106, 0.05);
  }

  .name {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.5px;
    margin-bottom: 0.4rem;
    color: #e0e0e0;
  }

  .role {
    font-size: 13px;
    color: #606070;
    margin-bottom: 2.5rem;
    letter-spacing: 0.3px;
  }

  .status {
    font-size: 13px;
    color: #505060;
    margin-bottom: 2.5rem;
    min-height: 20px;
    text-align: center;
    transition: color 0.3s;
  }

  .status.active { color: #8080c0; }
  .status.error { color: #c06060; }

  .call-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.3s;
    outline: none;
  }

  .call-btn:active { transform: scale(0.94); }

  .call-btn.idle {
    background: #1a3a2a;
  }

  .call-btn.idle:hover {
    background: #1e4a32;
  }

  .call-btn.active {
    background: #3a1a1a;
  }

  .call-btn.active:hover {
    background: #4a1e1e;
  }

  .call-btn.loading {
    background: #1a1a3a;
    cursor: default;
  }

  .call-btn svg {
    width: 28px;
    height: 28px;
  }

  .briefing {
    margin-top: 2.5rem;
    max-width: 360px;
    width: 100%;
    background: #111118;
    border: 1px solid #1e1e2e;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: none;
  }

  .briefing.visible { display: block; }

  .briefing-title {
    font-size: 11px;
    color: #404050;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .briefing-text {
    font-size: 13px;
    color: #707080;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .wave {
    display: flex;
    gap: 4px;
    align-items: center;
    height: 24px;
    margin-bottom: 2rem;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .wave.active { opacity: 1; }

  .wave span {
    display: block;
    width: 3px;
    background: #4a4aaa;
    border-radius: 2px;
    animation: wave 1.2s ease-in-out infinite;
  }

  .wave span:nth-child(1) { animation-delay: 0s; }
  .wave span:nth-child(2) { animation-delay: 0.15s; }
  .wave span:nth-child(3) { animation-delay: 0.3s; }
  .wave span:nth-child(4) { animation-delay: 0.15s; }
  .wave span:nth-child(5) { animation-delay: 0s; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 20px; }
  }

  .mute-btn {
    margin-top: 1.25rem;
    background: none;
    border: 1px solid #2a2a3a;
    color: #606070;
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    display: none;
  }

  .mute-btn.visible { display: block; }
  .mute-btn:hover { border-color: #4a4a6a; color: #a0a0c0; }
  .mute-btn.muted { border-color: #6a2a2a; color: #c08080; }
</style>
</head>
<body>

<div class="avatar" id="avatar">К</div>
<div class="name">Екатерина</div>
<div class="role">Личный ассистент</div>

<div class="wave" id="wave">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="status" id="status">Нажмите чтобы позвонить</div>

<button class="call-btn idle" id="callBtn" onclick="toggleCall()" aria-label="Позвонить">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path id="btnIcon" d="M3 5.5C3 14.613 9.387 22 18.5 22l2-.001a1.5 1.5 0 001.5-1.499v-2.999a1.5 1.5 0 00-1.268-1.484l-3.73-.62a1.5 1.5 0 00-1.517.735l-.858 1.525A13.02 13.02 0 018.373 11.47l1.525-.857A1.5 1.5 0 0010.633 9.1l-.619-3.731A1.5 1.5 0 008.53 4H5.5A1.5 1.5 0 004 5.5z" stroke="#4a9a6a"/>
  </svg>
</button>

<button class="mute-btn" id="muteBtn" onclick="toggleMute()">Отключить микрофон</button>

<div class="briefing" id="briefing">
  <div class="briefing-title">Данные для звонка</div>
  <div class="briefing-text" id="briefingText"></div>
</div>

<script>
const AGENT_ID = 'agent_0201kstm144xe6n94rb4knrew7z7';


// n8n webhook для получения данных календаря и почты
const N8N_BRIEFING_WEBHOOK = 'https://primary-production-f690.up.railway.app/webhook/briefing';

let conversation = null;
let isMuted = false;
let isActive = false;

const statusEl = document.getElementById('status');
const avatarEl = document.getElementById('avatar');
const callBtn = document.getElementById('callBtn');
const muteBtn = document.getElementById('muteBtn');
const waveEl = document.getElementById('wave');
const briefingEl = document.getElementById('briefing');
const briefingTextEl = document.getElementById('briefingText');
const btnIcon = document.getElementById('btnIcon');

function setStatus(text, type) {
  statusEl.textContent = text;
  statusEl.className = 'status' + (type ? ' ' + type : '');
}

function setAvatarMode(mode) {
  avatarEl.className = 'avatar' + (mode ? ' ' + mode : '');
}

async function fetchBriefingOnce() {
  const res = await fetch(N8N_BRIEFING_WEBHOOK, { method: 'POST' });
  const text = await res.text();
  if (!text || !text.trim()) throw new Error('empty response');
  return JSON.parse(text);
}

async function getBriefing() {
  if (!N8N_BRIEFING_WEBHOOK) {
    console.warn('[Briefing] N8N_BRIEFING_WEBHOOK не задан, пропускаю.');
    return null;
  }
  console.log('[Briefing] Запрашиваю:', N8N_BRIEFING_WEBHOOK);
  try {
    const data = await fetchBriefingOnce();
    console.log('[Briefing] Ответ от webhook:', data);
    return data || null;
  } catch(e) {
    console.warn('[Briefing] Первая попытка неудачна:', e.message, '— повтор через 2с');
    await new Promise(r => setTimeout(r, 2000));
    try {
      const data = await fetchBriefingOnce();
      console.log('[Briefing] Ответ (повтор):', data);
      return data || null;
    } catch(e2) {
      console.error('[Briefing] Ошибка fetch (обе попытки):', e2);
      return null;
    }
  }
}

async function toggleCall() {
  if (isActive) {
    await endCall();
  } else {
    await startCall();
  }
}

async function startCall() {
  callBtn.className = 'call-btn loading';
  setStatus('Подготовка...', 'active');

  try {
    await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    setStatus('Нет доступа к микрофону', 'error');
    callBtn.className = 'call-btn idle';
    return;
  }

  setStatus('Загружаю данные...', 'active');
  const briefingData = await getBriefing();
  console.log('[startCall] briefingData после await:', briefingData);

  if (briefingData) {
    briefingTextEl.textContent = briefingData.calendar_briefing || '';
    briefingEl.classList.add('visible');
  }

  setStatus('Соединяю...', 'active');

  try {
    // UMD регистрируется как window.client (см. lib.umd.js)
    const Conversation = window.client?.Conversation;
    if (!Conversation) {
      console.error('[SDK] window.client:', window.client);
      setStatus('SDK не загружен — обновите страницу', 'error');
      callBtn.className = 'call-btn idle';
      return;
    }

    const sessionConfig = {
      agentId: AGENT_ID,
      connectionType: 'webrtc',
      onConnect: () => {
        isActive = true;
        setStatus('Соединено', 'active');
        setAvatarMode('');
        callBtn.className = 'call-btn active';
        muteBtn.classList.add('visible');
        btnIcon.setAttribute('stroke', '#c06060');
        btnIcon.setAttribute('d', 'M18 6L6 18M6 6l12 12');
        waveEl.classList.add('active');
      },
      onDisconnect: () => {
        resetUI();
      },
      onError: (err) => {
        setStatus('Ошибка соединения', 'error');
        resetUI();
      },
      onModeChange: ({ mode }) => {
        if (mode === 'speaking') {
          setAvatarMode('speaking');
          setStatus('Екатерина говорит...', 'active');
        } else if (mode === 'listening') {
          setAvatarMode('listening');
          setStatus('Слушает...', 'active');
        }
      }
    };

    if (briefingData) {
      sessionConfig.dynamicVariables = {
        calendar_briefing: briefingData.calendar_briefing || '',
        current_date: briefingData.current_date || '',
        current_time: briefingData.current_time || '',
        timezone: briefingData.timezone || 'Europe/Lisbon',
        call_mode: briefingData.call_mode || 'personal'
      };
    }
    console.log('[startCall] dynamicVariables для ElevenLabs:', sessionConfig.dynamicVariables);

    conversation = await Conversation.startSession(sessionConfig);

  } catch(e) {
    console.error(e);
    setStatus('Ошибка: ' + (e.message || 'попробуйте ещё раз'), 'error');
    callBtn.className = 'call-btn idle';
  }
}

async function endCall() {
  if (conversation) {
    try { await conversation.endSession(); } catch(e) {}
    conversation = null;
  }
  resetUI();
}

function resetUI() {
  isActive = false;
  isMuted = false;
  callBtn.className = 'call-btn idle';
  muteBtn.classList.remove('visible');
  muteBtn.classList.remove('muted');
  muteBtn.textContent = 'Отключить микрофон';
  waveEl.classList.remove('active');
  setAvatarMode('');
  setStatus('Нажмите чтобы позвонить');
  btnIcon.setAttribute('stroke', '#4a9a6a');
  btnIcon.setAttribute('d', 'M3 5.5C3 14.613 9.387 22 18.5 22l2-.001a1.5 1.5 0 001.5-1.499v-2.999a1.5 1.5 0 00-1.268-1.484l-3.73-.62a1.5 1.5 0 00-1.517.735l-.858 1.525A13.02 13.02 0 018.373 11.47l1.525-.857A1.5 1.5 0 0010.633 9.1l-.619-3.731A1.5 1.5 0 008.53 4H5.5A1.5 1.5 0 004 5.5z');
}

async function toggleMute() {
  if (!conversation) return;
  isMuted = !isMuted;
  conversation.setMicMuted(isMuted);
  muteBtn.textContent = isMuted ? 'Включить микрофон' : 'Отключить микрофон';
  muteBtn.classList.toggle('muted', isMuted);
}
</script>
</body>
</html>
